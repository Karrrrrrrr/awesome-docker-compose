version: '3.8'

services:
  # Redis Cluster - 6节点 (3主3从)
  redis-node-1:
    image: redis:7-alpine
    container_name: redis-cluster-1
    restart: unless-stopped
    command: redis-server --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --port 6379
    ports:
      - "7001:6379"
    volumes:
      - redis_cluster_1:/data
    networks:
      redis_cluster:
        aliases:
          - redis-node-1

  redis-node-2:
    image: redis:7-alpine
    container_name: redis-cluster-2
    restart: unless-stopped
    command: redis-server --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --port 6379
    ports:
      - "7002:6379"
    volumes:
      - redis_cluster_2:/data
    networks:
      redis_cluster:
        aliases:
          - redis-node-2

  redis-node-3:
    image: redis:7-alpine
    container_name: redis-cluster-3
    restart: unless-stopped
    command: redis-server --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --port 6379
    ports:
      - "7003:6379"
    volumes:
      - redis_cluster_3:/data
    networks:
      redis_cluster:
        aliases:
          - redis-node-3

  redis-node-4:
    image: redis:7-alpine
    container_name: redis-cluster-4
    restart: unless-stopped
    command: redis-server --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --port 6379
    ports:
      - "7004:6379"
    volumes:
      - redis_cluster_4:/data
    networks:
      redis_cluster:
        aliases:
          - redis-node-4

  redis-node-5:
    image: redis:7-alpine
    container_name: redis-cluster-5
    restart: unless-stopped
    command: redis-server --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --port 6379
    ports:
      - "7005:6379"
    volumes:
      - redis_cluster_5:/data
    networks:
      redis_cluster:
        aliases:
          - redis-node-5

  redis-node-6:
    image: redis:7-alpine
    container_name: redis-cluster-6
    restart: unless-stopped
    command: redis-server --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --port 6379
    ports:
      - "7006:6379"
    volumes:
      - redis_cluster_6:/data
    networks:
      redis_cluster:
        aliases:
          - redis-node-6

  # 集群初始化容器
  cluster-init:
    image: redis:7-alpine
    container_name: redis-cluster-init
    depends_on:
      - redis-node-1
      - redis-node-2
      - redis-node-3
      - redis-node-4
      - redis-node-5
      - redis-node-6
    entrypoint: []
    command: >
      sh -c "sleep 5 &&
      redis-cli --cluster create
      redis-node-1:6379
      redis-node-2:6379
      redis-node-3:6379
      redis-node-4:6379
      redis-node-5:6379
      redis-node-6:6379
      --cluster-replicas 1 --cluster-yes"
    networks:
      - redis_cluster

volumes:
  redis_cluster_1:
  redis_cluster_2:
  redis_cluster_3:
  redis_cluster_4:
  redis_cluster_5:
  redis_cluster_6:

networks:
  redis_cluster:
    driver: bridge
