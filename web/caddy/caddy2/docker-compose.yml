version: '3.8'

services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy2
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
      - "${CADDY_HTTP3_PORT:-443}:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./config:/config
      - ./data:/data
      - ./site:/srv:ro
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - caddy_network

networks:
  caddy_network:
    driver: bridge
