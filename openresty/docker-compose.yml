version: '3.8'

services:
  openresty:
    image: openresty/openresty:alpine
    container_name: openresty
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    ports:
      - "${OPENRESTY_HTTP_PORT:-80}:80"
      - "${OPENRESTY_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./conf.d:/etc/nginx/conf.d:ro
      - ./html:/usr/local/openresty/nginx/html:ro
      - ./ssl:/etc/nginx/ssl:ro
      - openresty_logs:/usr/local/openresty/nginx/logs
    healthcheck:
      test: ["CMD", "openresty", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - openresty_network

volumes:
  openresty_logs:
    driver: local

networks:
  openresty_network:
    driver: bridge
