version: '3.8'

# Bitnami Redis Sentinel - 高可用 Redis 方案
services:
  redis-master:
    image: bitnami/redis:7.2
    container_name: redis-master
    restart: unless-stopped
    environment:
      REDIS_REPLICATION_MODE: master
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123456}
      REDIS_AOF_ENABLED: "yes"
    ports:
      - "${REDIS_MASTER_PORT:-6379}:6379"
    volumes:
      - redis_master_data:/bitnami/redis/data
    networks:
      redis_sentinel:
        aliases:
          - redis-master

  redis-replica-1:
    image: bitnami/redis:7.2
    container_name: redis-replica-1
    restart: unless-stopped
    environment:
      REDIS_REPLICATION_MODE: replica
      REDIS_MASTER_HOST: redis-master
      REDIS_MASTER_PASSWORD: ${REDIS_PASSWORD:-redis123456}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123456}
    depends_on:
      - redis-master
    volumes:
      - redis_replica_1_data:/bitnami/redis/data
    networks:
      - redis_sentinel

  redis-replica-2:
    image: bitnami/redis:7.2
    container_name: redis-replica-2
    restart: unless-stopped
    environment:
      REDIS_REPLICATION_MODE: replica
      REDIS_MASTER_HOST: redis-master
      REDIS_MASTER_PASSWORD: ${REDIS_PASSWORD:-redis123456}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123456}
    depends_on:
      - redis-master
    volumes:
      - redis_replica_2_data:/bitnami/redis/data
    networks:
      - redis_sentinel

  # Sentinel 节点 (3个)
  sentinel-1:
    image: bitnami/redis-sentinel:7.2
    container_name: redis-sentinel-1
    restart: unless-stopped
    environment:
      REDIS_MASTER_HOST: redis-master
      REDIS_MASTER_PASSWORD: ${REDIS_PASSWORD:-redis123456}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123456}
      REDIS_SENTINEL_QUORUM: 2
      REDIS_SENTINEL_DOWN_AFTER_MILLISECONDS: 5000
      REDIS_SENTINEL_FAILOVER_TIMEOUT: 10000
    depends_on:
      - redis-master
    ports:
      - "${SENTINEL_1_PORT:-26379}:26379"
    networks:
      - redis_sentinel

  sentinel-2:
    image: bitnami/redis-sentinel:7.2
    container_name: redis-sentinel-2
    restart: unless-stopped
    environment:
      REDIS_MASTER_HOST: redis-master
      REDIS_MASTER_PASSWORD: ${REDIS_PASSWORD:-redis123456}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123456}
      REDIS_SENTINEL_QUORUM: 2
    depends_on:
      - redis-master
    ports:
      - "${SENTINEL_2_PORT:-26380}:26379"
    networks:
      - redis_sentinel

  sentinel-3:
    image: bitnami/redis-sentinel:7.2
    container_name: redis-sentinel-3
    restart: unless-stopped
    environment:
      REDIS_MASTER_HOST: redis-master
      REDIS_MASTER_PASSWORD: ${REDIS_PASSWORD:-redis123456}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123456}
      REDIS_SENTINEL_QUORUM: 2
    depends_on:
      - redis-master
    ports:
      - "${SENTINEL_3_PORT:-26381}:26379"
    networks:
      - redis_sentinel

volumes:
  redis_master_data:
  redis_replica_1_data:
  redis_replica_2_data:

networks:
  redis_sentinel:
    driver: bridge
