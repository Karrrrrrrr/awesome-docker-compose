version: '3.8'

# Vaultwarden (Bitwarden RS) - 密码管理器
services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      ADMIN_TOKEN: ${ADMIN_TOKEN:-admin-token-change-me}
      SIGNUPS_ALLOWED: ${SIGNUPS_ALLOWED:-true}
      INVITATIONS_ALLOWED: ${INVITATIONS_ALLOWED:-true}
      DOMAIN: ${DOMAIN:-http://localhost:8123}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURITY: ${SMTP_SECURITY:-starttls}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      TZ: Asia/Shanghai
    ports:
      - "${VAULTWARDEN_PORT:-8123}:80"
      - "${VAULTWARDEN_WEBSOCKET_PORT:-3012}:3012"
    volumes:
      - vaultwarden_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/alive"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - vaultwarden_network

volumes:
  vaultwarden_data:
    driver: local

networks:
  vaultwarden_network:
    driver: bridge
