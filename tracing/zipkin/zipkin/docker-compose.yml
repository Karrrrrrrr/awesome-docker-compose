version: '3.8'

services:
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin
    restart: unless-stopped
    environment:
      - STORAGE_TYPE=mem
      - TZ=Asia/Shanghai
    ports:
      - "${ZIPKIN_PORT:-9411}:9411"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:9411/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - zipkin_network

networks:
  zipkin_network:
    driver: bridge
