version: '3.8'

services:
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: :9411
      COLLECTOR_OTLP_ENABLED: "true"
      JAEGER_DISABLED: "false"
      TZ: Asia/Shanghai
    ports:
      # UI
      - "${JAEGER_UI_PORT:-16686}:16686"
      # HTTP collector
      - "${JAEGER_COLLECTOR_HTTP_PORT:-14268}:14268"
      # gRPC collector
      - "${JAEGER_COLLECTOR_GRPC_PORT:-14250}:14250"
      # Zipkin collector
      - "${JAEGER_ZIPKIN_PORT:-9411}:9411"
      # OTLP gRPC collector
      - "${JAEGER_OTLP_GRPC_PORT:-4317}:4317"
      # OTLP HTTP collector
      - "${JAEGER_OTLP_HTTP_PORT:-4318}:4318"
      # UDP - agent compact thrift protocol
      - "${JAEGER_AGENT_UDP_PORT:-6831}:6831/udp"
      # UDP - agent binary thrift protocol
      - "${JAEGER_AGENT_BINARY_PORT:-6832}:6832/udp"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:16686/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - jaeger_network

networks:
  jaeger_network:
    driver: bridge
