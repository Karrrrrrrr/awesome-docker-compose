version: '3.8'

services:
  debian:
    image: debian:12
    container_name: debian12
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      DEBIAN_FRONTEND: noninteractive
    command: tail -f /dev/null
    volumes:
      - debian_home:/root
      - ./data:/data
    networks:
      - debian_network

volumes:
  debian_home:
    driver: local

networks:
  debian_network:
    driver: bridge
