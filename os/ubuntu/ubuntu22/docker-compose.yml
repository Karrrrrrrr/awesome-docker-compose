version: '3.8'

services:
  ubuntu:
    image: ubuntu:22.04
    container_name: ubuntu22
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      DEBIAN_FRONTEND: noninteractive
    command: tail -f /dev/null
    volumes:
      - ubuntu_home:/root
      - ./data:/data
    networks:
      - ubuntu_network

volumes:
  ubuntu_home:
    driver: local

networks:
  ubuntu_network:
    driver: bridge
