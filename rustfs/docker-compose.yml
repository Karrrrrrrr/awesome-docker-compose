version: '3.8'

services:
  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustfs
    restart: unless-stopped
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin123456}
      RUSTFS_STORAGE_PATH: /data
      RUSTFS_PORT: 9000
      TZ: Asia/Shanghai
    ports:
      - "${RUSTFS_PORT:-9000}:9000"
    volumes:
      - rustfs_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - rustfs_network

volumes:
  rustfs_data:
    driver: local

networks:
  rustfs_network:
    driver: bridge
