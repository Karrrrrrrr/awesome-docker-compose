version: '3.8'

# Promtail - 日志收集代理
services:
  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    command:
      - "-config.file=/etc/promtail/config.yml"
    environment:
      TZ: Asia/Shanghai
    ports:
      - "${PROMTAIL_PORT:-9088}:9080"
    volumes:
      - ./config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9088/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - promtail_network

volumes:
  promtail_data:

networks:
  promtail_network:
    driver: bridge
