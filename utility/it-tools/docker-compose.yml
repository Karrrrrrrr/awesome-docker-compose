version: '3.8'

# IT-Tools - IT人员常用工具集
services:
  it-tools:
    image: corentinth/it-tools:latest
    container_name: it-tools
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    ports:
      - "${IT_TOOLS_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ittools_network

networks:
  ittools_network:
    driver: bridge
