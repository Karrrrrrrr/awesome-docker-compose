version: '3.8'

services:
  sing-box:
    image: ghcr.io/sagernet/sing-box:latest
    container_name: sing-box
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "${SINGBOX_MIXED_PORT:-2080}:2080"
      - "${SINGBOX_SOCKS_PORT:-2081}:2081"
      - "${SINGBOX_HTTP_PORT:-2082}:2082"
    volumes:
      - ./config:/etc/sing-box
      - singbox_data:/var/log/sing-box
    command: ["run", "-c", "/etc/sing-box/config.json"]
    networks:
      - singbox_network

networks:
  singbox_network:
    driver: bridge

volumes:
  singbox_data:
