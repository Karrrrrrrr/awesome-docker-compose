version: '3.8'

services:
  v2ray:
    image: v2fly/v2fly-core:latest
    container_name: v2ray
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "${V2RAY_PORT:-1080}:1080"
      - "${V2RAY_HTTP_PORT:-8080}:8080"
    volumes:
      - ./config:/etc/v2ray
      - v2ray_data:/var/log/v2ray
    command: ["v2ray", "run", "-c", "/etc/v2ray/config.json"]
    networks:
      - v2ray_network

networks:
  v2ray_network:
    driver: bridge

volumes:
  v2ray_data:
