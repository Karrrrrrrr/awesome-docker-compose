version: '3.8'

services:
  clash:
    image: metacubex/mihomo:latest
    container_name: clash
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "${CLASH_MIXED_PORT:-7890}:7890"
      - "${CLASH_SOCKS_PORT:-7891}:7891"
      - "${CLASH_HTTP_PORT:-7892}:7892"
      - "${CLASH_DASHBOARD_PORT:-9090}:9090"
    volumes:
      - ./config:/root/.config/mihomo
      - clash_data:/root/.config
    networks:
      - clash_network

networks:
  clash_network:
    driver: bridge

volumes:
  clash_data:
