version: '3.8'

services:
  dtm:
    image: yedf/dtm:latest
    container_name: dtm
    restart: unless-stopped
    environment:
      IS_DOCKER: "1"
      STORE_DRIVER: mysql
      STORE_HOST: dtm-mysql
      STORE_PORT: 3306
      STORE_USER: root
      STORE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-dtm123456}
      TZ: Asia/Shanghai
    ports:
      - "${DTM_HTTP_PORT:-36789}:36789"
      - "${DTM_GRPC_PORT:-36790}:36790"
    depends_on:
      dtm-mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:36789/api/dtmsvr/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - dtm_network

  dtm-mysql:
    image: mysql:8
    container_name: dtm-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-dtm123456}
      MYSQL_DATABASE: dtm
      TZ: Asia/Shanghai
    volumes:
      - dtm_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-dtm123456}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dtm_network

volumes:
  dtm_mysql_data:
    driver: local

networks:
  dtm_network:
    driver: bridge
