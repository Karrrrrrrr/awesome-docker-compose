# Filebeat 配置文件

filebeat.inputs:
  # 容器日志
  - type: container
    paths:
      - /var/lib/docker/containers/*/*.log
    processors:
      - add_docker_metadata:
          host: "unix:///var/run/docker.sock"
      - decode_json_fields:
          fields: ["message"]
          target: "json"
          overwrite_keys: true

  # 系统日志
  - type: log
    paths:
      - /var/log/*.log
      - /var/log/syslog
      - /var/log/messages
    fields:
      type: syslog
    fields_under_root: true

  # Nginx 日志
  - type: log
    paths:
      - /var/log/nginx/*.log
    fields:
      type: nginx
    fields_under_root: true
    multiline:
      pattern: '^[0-9]{4}-[0-9]{2}-[0-9]{2}'
      negate: true
      match: after

# 输出到 Logstash
output.logstash:
  hosts: ["logstash:5044"]
  bulk_max_size: 2048

# 输出到 Elasticsearch (备用)
# output.elasticsearch:
#   hosts: ["http://elasticsearch:9200"]
#   username: "elastic"
#   password: "${ELASTIC_PASSWORD}"
#   index: "filebeat-%{+yyyy.MM.dd}"

# Kibana 设置
setup.kibana:
  host: "kibana:5601"
  username: "elastic"
  password: "${ELASTIC_PASSWORD}"

# 处理器
processors:
  - add_host_metadata:
      when.not.contains.tags: forwarded
  - add_cloud_metadata: ~
  - add_docker_metadata: ~

# 日志设置
logging.level: info
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat
  keepfiles: 7
  permissions: 0644

# 监控
monitoring.enabled: true
monitoring.elasticsearch:
  hosts: ["http://elasticsearch:9200"]
  username: "elastic"
  password: "${ELASTIC_PASSWORD}"
