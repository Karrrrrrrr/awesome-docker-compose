# Logstash Pipeline 配置示例

# Beats 输入
input {
  beats {
    port => 5044
    ssl => false
  }

  # TCP 输入
  tcp {
    port => 5000
    codec => json_lines
  }

  # HTTP 输入
  http {
    port => 8080
    codec => json
  }
}

# 过滤器
filter {
  # 解析JSON
  if [message] =~ /^\{/ {
    json {
      source => "message"
    }
  }

  # 添加时间戳
  date {
    match => ["timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss", "yyyy-MM-dd HH:mm:ss.SSS"]
    target => "@timestamp"
  }

  # GeoIP
  if [client_ip] {
    geoip {
      source => "client_ip"
      target => "geoip"
    }
  }

  # User Agent 解析
  if [user_agent] {
    useragent {
      source => "user_agent"
      target => "ua"
    }
  }

  # 添加标签
  mutate {
    add_field => { "logstash_processed" => "true" }
  }

  # 删除不需要的字段
  mutate {
    remove_field => ["host"]
  }
}

# Elasticsearch 输出
output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    user => "elastic"
    password => "${ELASTIC_PASSWORD}"
    index => "logstash-%{[service_name]}-%{+YYYY.MM.dd}"
    template_name => "logstash"
    template_overwrite => true
  }

  # 调试输出 (可选)
  # stdout {
  #   codec => rubydebug
  # }
}
