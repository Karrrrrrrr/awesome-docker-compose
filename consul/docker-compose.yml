version: '3.8'

services:
  consul:
    image: consul:1.15
    container_name: consul
    restart: unless-stopped
    command: agent -server -ui -bootstrap-expect=1 -client=0.0.0.0
    environment:
      CONSUL_BIND_INTERFACE: eth0
      TZ: Asia/Shanghai
    ports:
      - "${CONSUL_HTTP_PORT:-8500}:8500"      # HTTP API & UI
      - "${CONSUL_DNS_PORT:-8600}:8600/udp"   # DNS
      - "${CONSUL_GRPC_PORT:-8502}:8502"      # gRPC
    volumes:
      - consul_data:/consul/data
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - consul_network

  # Consul Config Loader - 用于加载配置
  # consul-loader:
  #   image: consul:1.15
  #   depends_on:
  #     consul:
  #       condition: service_healthy
  #   volumes:
  #     - ./config:/config
  #   command: consul kv put @config/

volumes:
  consul_data:
    driver: local

networks:
  consul_network:
    driver: bridge
