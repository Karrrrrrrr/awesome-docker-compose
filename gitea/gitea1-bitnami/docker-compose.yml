version: '3.8'

# Bitnami Gitea - Git服务
services:
  gitea:
    image: bitnami/gitea:1.21
    container_name: gitea1-bitnami
    restart: unless-stopped
    environment:
      GITEA_DATABASE_HOST: gitea-db:5432
      GITEA_DATABASE_NAME: gitea
      GITEA_DATABASE_USERNAME: gitea
      GITEA_DATABASE_PASSWORD: ${GITEA_DB_PASSWORD:-gitea123456}
      GITEA_DATABASE_TYPE: postgres
      GITEA_ROOT_URL: ${GITEA_ROOT_URL:-http://localhost:3000}
      GITEA_HTTP_PORT: 3000
      GITEA_SSH_PORT: 22
      GITEA_APP_NAME: Gitea
      GITEA_LANDING_PAGE: home
      GITEA_USER: ${GITEA_ADMIN_USER:-admin}
      GITEA_PASSWORD: ${GITEA_ADMIN_PASSWORD:-admin123456}
      GITEA_EMAIL: ${GITEA_ADMIN_EMAIL:-admin@localhost}
      TZ: Asia/Shanghai
    ports:
      - "${GITEA_HTTP_PORT:-3000}:3000"
      - "${GITEA_SSH_PORT:-2222}:22"
    volumes:
      - gitea_data:/bitnami/gitea
    depends_on:
      - gitea-db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - gitea_network

  gitea-db:
    image: bitnami/postgresql:15
    container_name: gitea-db-bitnami
    restart: unless-stopped
    environment:
      POSTGRESQL_USERNAME: gitea
      POSTGRESQL_PASSWORD: ${GITEA_DB_PASSWORD:-gitea123456}
      POSTGRESQL_DATABASE: gitea
    volumes:
      - gitea_db_data:/bitnami/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitea"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gitea_network

volumes:
  gitea_data:
    driver: local
  gitea_db_data:
    driver: local

networks:
  gitea_network:
    driver: bridge
