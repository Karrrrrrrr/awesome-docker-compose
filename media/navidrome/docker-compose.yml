version: '3.8'

# Navirome - 视频监控NVR
services:
  navirome:
    image: ghcr.io/navirome/navirome:latest
    container_name: navirome
    restart: unless-stopped
    privileged: true
    environment:
      TZ: Asia/Shanghai
    ports:
      - "${NAVIROME_PORT:-3443}:3443"
    volumes:
      - ./config:/config
      - ./media:/media
      - ./recordings:/recordings
      - ./logs:/logs
    networks:
      - navirome_network

networks:
  navirome_network:
    driver: bridge
