version: '3.8'

# Ollama - 本地LLM运行环境
services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_ORIGINS: "*"
      TZ: Asia/Shanghai
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU 支持 (NVIDIA)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ollama_network

  # Open WebUI - Ollama Web界面
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-webui-secret-key}
      WEBUI_AUTH: "true"
      WEBUI_AUTH_SIGNUP_DISABLED: "false"
      DATA_DIR: /app/backend/data
      TZ: Asia/Shanghai
    ports:
      - "${OPEN_WEBUI_PORT:-3000}:8080"
    volumes:
      - open_webui_data:/app/backend/data
    depends_on:
      - ollama
    networks:
      - ollama_network

volumes:
  ollama_data:
    driver: local
  open_webui_data:
    driver: local

networks:
  ollama_network:
    driver: bridge
