version: '3.8'

# Drone CI - 轻量级CI/CD
services:
  drone:
    image: drone/drone:2
    container_name: drone
    restart: unless-stopped
    environment:
      # 服务器配置
      DRONE_SERVER_HOST: ${DRONE_HOST:-localhost}
      DRONE_SERVER_PROTO: ${DRONE_PROTO:-http}
      DRONE_TLS_AUTOCERT: "false"
      # Git 提供商 (选择一个)
      # Gitea
      DRONE_GITEA_SERVER: ${GITEA_URL:-http://gitea:3000}
      DRONE_GITEA_CLIENT_ID: ${DRONE_GITEA_CLIENT_ID:-}
      DRONE_GITEA_CLIENT_SECRET: ${DRONE_GITEA_CLIENT_SECRET:-}
      # GitHub (取消注释使用)
      # DRONE_GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      # DRONE_GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      # GitLab (取消注释使用)
      # DRONE_GITLAB_CLIENT_ID: ${GITLAB_CLIENT_ID}
      # DRONE_GITLAB_CLIENT_SECRET: ${GITLAB_CLIENT_SECRET}
      # 用户配置
      DRONE_USER_CREATE: username:${DRONE_ADMIN:-admin},admin:true
      # RPC 密钥 (与 runner 保持一致)
      DRONE_RPC_SECRET: ${DRONE_RPC_SECRET:-drone-secret-rpc-key}
      # 数据库
      DRONE_DATABASE_DRIVER: postgres
      DRONE_DATABASE_DATASOURCE: postgres://drone:${DRONE_DB_PASSWORD:-drone123456}@drone-db:5432/drone?sslmode=disable
      TZ: Asia/Shanghai
    ports:
      - "${DRONE_HTTP_PORT:-8080}:80"
      - "${DRONE_HTTPS_PORT:-443}:443"
    volumes:
      - drone_data:/data
    depends_on:
      - drone-db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - drone_network

  # Drone Runner - Docker执行器
  drone-runner:
    image: drone/drone-runner-docker:1
    container_name: drone-runner
    restart: unless-stopped
    environment:
      DRONE_RPC_HOST: drone
      DRONE_RPC_PROTO: http
      DRONE_RPC_SECRET: ${DRONE_RPC_SECRET:-drone-secret-rpc-key}
      DRONE_RUNNER_CAPACITY: 2
      DRONE_RUNNER_NAME: drone-runner
      DRONE_UI_USERNAME: ${DRONE_RUNNER_USER:-admin}
      DRONE_UI_PASSWORD: ${DRONE_RUNNER_PASSWORD:-admin123456}
      TZ: Asia/Shanghai
    ports:
      - "${DRONE_RUNNER_PORT:-3000}:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - drone
    networks:
      - drone_network

  drone-db:
    image: postgres:15-alpine
    container_name: drone-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: drone
      POSTGRES_PASSWORD: ${DRONE_DB_PASSWORD:-drone123456}
      POSTGRES_DB: drone
    volumes:
      - drone_db_data:/var/lib/postgresql/data
    networks:
      - drone_network

volumes:
  drone_data:
  drone_db_data:

networks:
  drone_network:
    driver: bridge
